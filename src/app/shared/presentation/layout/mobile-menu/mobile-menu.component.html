<!-- Bottom Navigation Mobile (Visible on Mobile Only) -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3 pb-safe bg-white/80 backdrop-blur-xl border-t border-surface-container-low shadow-[0_-4px_20px_rgba(0,0,0,0.05)] md:hidden z-50 rounded-t-2xl">
  @for (item of navItems; track item.route) {
    <a 
      [routerLink]="item.route"
      routerLinkActive="bg-blue-50 text-blue-900 scale-90"
      class="flex flex-col items-center justify-center text-on-surface-variant rounded-xl px-4 py-1 transition-all"
      [class.bg-blue-50]="item.isActive"
      [class.text-blue-900]="item.isActive"
      [class.scale-90]="item.isActive">
      @if (item.isActive) {
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">{{ item.icon }}</span>
      } @else {
        <span class="material-symbols-outlined">{{ item.icon }}</span>
      }
      <span class="text-[11px] font-medium mt-1">{{ item.label }}</span>
    </a>
  }
</nav>
