<aside class="hidden md:flex h-screen w-64 fixed left-0 top-0 bg-surface-container-low flex-col p-4 space-y-2 z-40">
  <!-- Logo Section -->
  <div class="flex items-center px-4 py-6 mb-4">
    <div class="w-10 h-10 bg-gradient-to-br from-primary to-primary-container rounded-xl flex items-center justify-center mr-3 shadow-sm">
      <span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">engineering</span>
    </div>
    <div>
      <h2 class="text-lg font-black text-primary leading-none font-headline">ServiFlow</h2>
      <p class="text-[10px] uppercase tracking-wider text-on-surface-variant font-bold mt-1">Technical Operations</p>
    </div>
  </div>

  <!-- Navigation Links -->
  <nav class="space-y-1" data-testid="sidebar-nav">
    @for (item of navItems; track item.route) {
      <a 
        [routerLink]="item.route"
        routerLinkActive="bg-white text-primary font-semibold shadow-sm translate-x-1"
        [attr.data-testid]="'nav-link-' + getNavTestId(item.label)"
        class="flex items-center px-4 py-3 text-on-surface-variant hover:bg-surface-container-high transition-colors rounded-xl group">
        <span class="material-symbols-outlined mr-3">{{ item.icon }}</span>
        <span class="font-medium">{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- User Profile Section -->
  <div class="mt-auto p-4 bg-surface-container-low rounded-2xl">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-primary font-bold text-sm">
        {{ (authService.user()?.username?.charAt(0) || 'U').toUpperCase() }}
      </div>
      <div class="overflow-hidden">
        <p class="text-sm font-bold truncate">{{ authService.user()?.username || 'Usuario' }}</p>
        <p class="text-xs text-on-surface-variant truncate">{{ authService.user()?.role || 'Rol' }}</p>
      </div>
    </div>
  </div>
</aside>
