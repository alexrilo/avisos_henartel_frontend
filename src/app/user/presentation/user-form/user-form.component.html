<div class="p-8 max-w-2xl mx-auto">
  <h1 class="text-3xl font-extrabold text-primary mb-6">{{ isEditMode ? 'Editar Usuario' : 'Crear Usuario' }}</h1>

  <form (ngSubmit)="onSubmit()" #userForm="ngForm" class="bg-surface-container-lowest rounded-3xl p-6 shadow-sm ring-1 ring-outline-variant/10">
    @if (!isEditMode) {
      <div class="mb-6">
        <label for="username" class="block text-sm font-medium text-on-surface mb-2">Nombre de usuario</label>
        <input 
          type="text" 
          id="username" 
          [(ngModel)]="username" 
          name="username" 
          required
          class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary transition-all"
        />
      </div>

      <div class="mb-6">
        <label for="password" class="block text-sm font-medium text-on-surface mb-2">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          [(ngModel)]="password" 
          name="password" 
          required
          class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary transition-all"
        />
      </div>
    }

    <div class="mb-6">
      <label for="nombre" class="block text-sm font-medium text-on-surface mb-2">Nombre</label>
      <input 
        type="text" 
        id="nombre" 
        [(ngModel)]="nombre" 
        name="nombre" 
        required
        class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary transition-all"
      />
    </div>

    <div class="mb-6">
      <label for="apellido" class="block text-sm font-medium text-on-surface mb-2">Apellido</label>
      <input 
        type="text" 
        id="apellido" 
        [(ngModel)]="apellido" 
        name="apellido" 
        required
        class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary transition-all"
      />
    </div>

    <div class="mb-6">
      <label for="email" class="block text-sm font-medium text-on-surface mb-2">Email</label>
      <input 
        type="email" 
        id="email" 
        [(ngModel)]="email" 
        name="email" 
        required
        class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary transition-all"
      />
    </div>

    @if (!isEditMode) {
      <div class="mb-6">
        <label for="role" class="block text-sm font-medium text-on-surface mb-2">Rol</label>
        <select id="role" [(ngModel)]="role" name="role" required class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary transition-all">
          <option value="COORDINADOR">Coordinador</option>
          <option value="ADMINISTRADOR">Administrador</option>
          <option value="TECNICO">Técnico</option>
        </select>
      </div>
    }

    <div class="flex gap-4 mt-8">
      <button type="submit" [disabled]="userService.loading() || !userForm.valid" class="bg-gradient-to-r from-primary to-primary-container text-white px-6 py-3 rounded-xl font-semibold shadow-lg hover:opacity-90 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
        {{ isEditMode ? 'Actualizar' : 'Crear' }}
      </button>
      <button type="button" (click)="router.navigate(['/dashboard/usuarios'])" class="bg-surface-container-high text-on-surface px-6 py-3 rounded-xl font-medium hover:bg-surface-container-highest transition-colors">
        Cancelar
      </button>
    </div>
  </form>
</div>
