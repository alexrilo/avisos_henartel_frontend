<div class="container">
  <h1>Reprogramar Aviso</h1>

  @if (aviso()) {
    <div class="aviso-info">
      <p><strong>Número:</strong> {{ aviso()!.numeroCorrelativo }}</p>
      <p><strong>Descripción:</strong> {{ aviso()!.descripcion }}</p>
      <p><strong>Fecha programada actual:</strong> {{ aviso()!.fechaProgramada ? (aviso()!.fechaProgramada | date:'dd/MM/yyyy HH:mm') : 'No programada' }}</p>
    </div>
  }

  @if (error()) {
    <div class="error">{{ error() }}</div>
  }

  <form (ngSubmit)="onSubmit()" #form="ngForm" class="form">
    <div class="form-group">
      <label for="nuevaFecha">Nueva Fecha y Hora *</label>
      <input 
        type="datetime-local" 
        id="nuevaFecha" 
        [ngModel]="nuevaFecha()" 
        (ngModelChange)="nuevaFecha.set($event)" 
        name="nuevaFecha" 
        required
      />
    </div>

    <div class="form-group">
      <label for="nuevoTecnicoId">Nuevo Técnico (opcional)</label>
      <input 
        type="number" 
        id="nuevoTecnicoId" 
        [ngModel]="nuevoTecnicoId()" 
        (ngModelChange)="nuevoTecnicoId.set($event)" 
        name="nuevoTecnicoId" 
        placeholder="ID del nuevo técnico"
      />
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="loading() || !form.valid" class="btn btn-primary">
        {{ loading() ? 'Reprogramando...' : 'Reprogramar' }}
      </button>
      <a routerLink="/dashboard/avisos" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
