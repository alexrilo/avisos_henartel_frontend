<div class="p-8">
  <!-- Welcome Message -->
  <div class="bg-gradient-to-r from-primary to-primary-dark text-on-primary px-6 py-4 rounded-2xl mb-6 shadow-lg">
    <p class="text-xl font-semibold">
      Bienvenid&#64;, <span class="font-bold">{{ authService.user()?.username }}</span>
    </p>
  </div>

  <header class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-extrabold text-primary">Dashboard Operativo</h1>
    <div class="flex gap-4">
      <label class="flex items-center gap-2 text-sm text-on-surface-variant">
        Desde: 
        <input 
          type="date" 
          [ngModel]="dashboardService.filters().dateFrom" 
          (ngModelChange)="onDateChange('dateFrom', $event)"
          class="bg-surface-container-lowest border-none ring-1 ring-outline-variant rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary"
        />
      </label>
      <label class="flex items-center gap-2 text-sm text-on-surface-variant">
        Hasta: 
        <input 
          type="date" 
          [ngModel]="dashboardService.filters().dateTo" 
          (ngModelChange)="onDateChange('dateTo', $event)"
          class="bg-surface-container-lowest border-none ring-1 ring-outline-variant rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary"
        />
      </label>
    </div>
  </header>

  @if (dashboardService.loading()) {
    <div class="text-center text-on-surface-variant text-lg py-8">
      <span class="material-symbols-outlined animate-spin text-4xl">sync</span>
      <p class="mt-4">Cargando...</p>
    </div>
  } @else if (dashboardService.error()) {
    <div class="bg-error-container text-on-error-container px-6 py-4 rounded-2xl">
      {{ dashboardService.error() }}
    </div>
  } @else if (dashboardService.data()) {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <app-kpi-card label="Pendientes" [value]="dashboardService.data()!.metrics.pendientes" color="#ff9800"></app-kpi-card>
      <app-kpi-card label="Urgentes" [value]="dashboardService.data()!.metrics.urgentesPendientes" color="#f44336"></app-kpi-card>
      <app-kpi-card label="En Curso" [value]="dashboardService.data()!.metrics.enCurso" color="#2196f3"></app-kpi-card>
      <app-kpi-card label="Completados Hoy" [value]="dashboardService.data()!.metrics.completadosHoy" color="#4caf50"></app-kpi-card>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <app-urgent-list [items]="dashboardService.data()!.urgentList"></app-urgent-list>
      <app-technician-workload [workload]="dashboardService.data()!.technicianWorkload" [chartData]="dashboardService.data()!.chartByTechnician"></app-technician-workload>
    </div>
  }
</div>
